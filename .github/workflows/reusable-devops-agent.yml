# Reusable DevOps Agent — AI-driven version bump / debug-fix / Sonar self-heal.
#
# Inherited by any app repo:
#   jobs:
#     agent:
#       uses: jenistenxavier/Open-Source-Summit-India-Demo/.github/workflows/reusable-devops-agent.yml@main
#       with:
#         task: version-bump        # version-bump | debug | sonar-heal
#         instruction: ""           # free-text context for the agent (esp. for debug)
#         project-key: inventory-service
#         language: node
#       secrets: inherit
#
# The agent code lives in the `devops-agent` repo and is checked out at runtime.
# It commits and pushes its result directly to the branch that triggered the run.
name: reusable-devops-agent

on:
  workflow_call:
    inputs:
      task:
        description: Which activity the agent performs (version-bump | debug | sonar-heal)
        type: string
        required: true
      instruction:
        description: Free-text instruction / failure context for the agent
        type: string
        required: false
        default: ""
      project-key:
        description: SonarQube project key (sonar.projectKey) — required for sonar-heal
        type: string
        required: false
        default: ""
      language:
        description: App language (node | java | php)
        type: string
        required: false
        default: node
      working-directory:
        description: Subdir of the app repo the agent operates in
        type: string
        required: false
        default: .
      sonar-host-url:
        description: SonarQube CE base URL (self-hosted)
        type: string
        required: false
        default: "http://34.42.111.18/"
      agent-repo:
        description: Repo holding the devops-agent code
        type: string
        required: false
        default: "jenistenxavier/DevOps-Agent"
      agent-ref:
        description: Ref of the devops-agent repo to run
        type: string
        required: false
        default: "main"
      agent-model:
        description: Anthropic model id the agent runs on
        type: string
        required: false
        default: "claude-haiku-4-5"
      ref:
        description: Branch/ref of the app repo to operate on and push back to
        type: string
        required: false
        default: ${{ github.ref_name }}
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      SONAR_TOKEN:
        required: false

# The agent pushes commits and can comment on PRs.
permissions:
  contents: write
  pull-requests: write

jobs:
  agent:
    name: DevOps agent (${{ inputs.task }})
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the APP repo (the target the agent will fix) at the working branch.
      - name: Checkout app repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0 # full history — needed for version-bump commit range
          path: app
          # persist-credentials (default true) lets the agent `git push` with GITHUB_TOKEN.

      # 2. Check out the agent code into a sibling dir.
      - name: Checkout devops-agent
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.agent-repo }}
          ref: ${{ inputs.agent-ref }}
          path: devops-agent

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install agent deps
        working-directory: devops-agent
        run: npm ci || npm install

      # 3. Run the agent against the app checkout. It edits, commits and pushes itself.
      - name: Run agent
        id: agent
        working-directory: devops-agent
        env:
          TASK: ${{ inputs.task }}
          INSTRUCTION: ${{ inputs.instruction }}
          PROJECT_KEY: ${{ inputs.project-key }}
          LANGUAGE: ${{ inputs.language }}
          SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
          AGENT_MODEL: ${{ inputs.agent-model }}
          TARGET_REPO: ${{ github.workspace }}/app/${{ inputs.working-directory }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run agent

      # 4. If this run is attached to a PR, post the agent summary as a comment.
      - name: Comment summary on PR
        if: always() && github.event_name == 'pull_request' && steps.agent.outputs.summary != ''
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.agent.outputs.summary }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `### 🤖 DevOps agent — \`${{ inputs.task }}\`\n\n${summary}`
            });
